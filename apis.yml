apis:
  - name: Paperform API
    description: REST API for managing Paperform forms, submissions, partial submissions, products, coupons, webhooks, spaces, and translations. Standard API access is included on Pro plans; Business API endpoints (form updates, product management, webhook configuration) require Business or Enterprise plans.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://paperform.readme.io/reference/getting-started-1
