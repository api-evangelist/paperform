        url: https://paperform.readme.io/reference/getting-started-1
      - type: OpenAPI
        url: https://paperform.readme.io/llms.txt
  - name: Papersign API
    description: REST API for managing Papersign electronic signature documents, folders, spaces, and webhooks. Requires a separate Papersign API plan and provides endpoints to list, create, send, copy, cancel, and move signing documents.
